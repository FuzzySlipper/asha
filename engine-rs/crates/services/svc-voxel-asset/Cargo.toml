[package]
name = "svc-voxel-asset"
version = "0.1.0"
edition = "2021"
publish = false

# Rust authority service for validating, canonicalizing, hashing, and decoding
# Asha-native stored voxel-volume assets. It consumes public protocol DTOs and
# core asset/voxel vocabulary only; it has no renderer, Studio, or transport deps.
[dependencies]
core-assets = { path = "../../foundation/core-assets" }
protocol-diagnostics = { path = "../../protocol/protocol-diagnostics" }
protocol-voxel-asset = { path = "../../protocol/protocol-voxel-asset" }
serde_json = "1"
